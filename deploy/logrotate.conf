# UnicornX Aleo log rotation
# Install: sudo cp deploy/logrotate.conf /etc/logrotate.d/unicornx
# Replace $HOME in paths with the actual deploy user's home before copying,
# OR install via a small sed pass in deploy.sh.

$HOME/.pm2/logs/unicornx-*.log {
    weekly
    missingok
    rotate 8
    compress
    delaycompress
    notifempty
    copytruncate
    dateext
    dateformat -%Y%m%d
}

$HOME/unicornxaleo/server/logs/*.log {
    weekly
    missingok
    rotate 8
    compress
    delaycompress
    notifempty
    copytruncate
    dateext
    dateformat -%Y%m%d
}

/var/log/nginx/unicornx_*.log {
    weekly
    missingok
    rotate 8
    compress
    delaycompress
    notifempty
    sharedscripts
    postrotate
        [ -f /var/run/nginx.pid ] && kill -USR1 $(cat /var/run/nginx.pid) 2>/dev/null || true
    endscript
}
