# ─────────────────────────────────────────────────────────────
#  UnicornX Aleo — nginx reverse proxy for aleo.unicornx.fun
# ─────────────────────────────────────────────────────────────
#  Routes:
#    /        →  frontend (static dist served by `serve` on :5171)
#    /api/    →  backend (Node/Express on :5170)
#    /ws/     →  (reserved for future websocket scorer updates)
#
#  Install:
#    sudo cp nginx/aleo.unicornx.fun.conf /etc/nginx/sites-available/
#    sudo ln -s /etc/nginx/sites-available/aleo.unicornx.fun.conf \
#               /etc/nginx/sites-enabled/
#    sudo certbot --nginx -d aleo.unicornx.fun
#    sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name aleo.unicornx.fun;

    # certbot adds an SSL listener + redirect automatically after first run.
    # Until then, plain HTTP works too.

    # ---- API (Express backend on :5170) ----
    location /api/ {
        proxy_pass         http://127.0.0.1:5170;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;

        # CORS (backend also has express cors, but this is a safety net)
        add_header Access-Control-Allow-Origin  "https://aleo.unicornx.fun" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS"       always;
        add_header Access-Control-Allow-Headers "Content-Type, X-Admin-Key" always;
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # ---- Frontend (Vite build served via `serve` on :5171) ----
    location / {
        proxy_pass         http://127.0.0.1:5171;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SPA fallback — serve index.html for unknown routes so React router works
        proxy_intercept_errors on;
        error_page 404 = @spa_fallback;
    }

    location @spa_fallback {
        proxy_pass http://127.0.0.1:5171/;
    }

    # ---- Security headers (applied after certbot enables SSL) ----
    # Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # X-Frame-Options "SAMEORIGIN" always;
    # X-Content-Type-Options "nosniff" always;

    client_max_body_size 5M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}
