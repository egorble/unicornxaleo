# UnicornX Aleo — aleo.unicornx.fun
# nginx reverse proxy: /api/ → backend :5170, everything else → frontend :5171

# Rate limiting zones (per-IP)
limit_req_zone $binary_remote_addr zone=unicornx_api:10m rate=300r/s;
limit_req_zone $binary_remote_addr zone=unicornx_general:10m rate=500r/s;

# Upstream backends
upstream unicornx_backend {
    server 127.0.0.1:5170;
    keepalive 32;
}

upstream unicornx_frontend {
    server 127.0.0.1:5171;
    keepalive 16;
}


# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name aleo.unicornx.fun;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name aleo.unicornx.fun;

    # SSL certificates (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/aleo.unicornx.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aleo.unicornx.fun/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/aleo.unicornx.fun/chain.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:unicornx_SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # Logging
    access_log /var/log/nginx/unicornx_access.log;
    error_log /var/log/nginx/unicornx_error.log;

    # Max body size
    client_max_body_size 5m;

    # ─── API proxy ───
    location /api/ {
        limit_req zone=unicornx_api burst=500 nodelay;

        proxy_pass http://unicornx_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeouts — leo execute generates ZK proofs (CPU-bound, 2-5 min per tx).
        proxy_connect_timeout 10s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        # No caching for API
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ─── Certbot HTTP-01 challenge (also available on HTTPS for renewals) ───
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # ─── Frontend (served by `serve` on :5171) ───
    location / {
        limit_req zone=unicornx_general burst=1000 nodelay;

        proxy_pass http://unicornx_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 60s;

        # `serve` already handles SPA fallback (-s flag), but provide a safety net
        proxy_intercept_errors on;
        error_page 404 = @spa_fallback;
    }

    # SPA fallback: if `serve` 404s, return the index
    location @spa_fallback {
        rewrite ^.*$ /index.html break;
        proxy_pass http://unicornx_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
