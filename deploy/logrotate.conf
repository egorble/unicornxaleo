# UnicornX Aleo log rotation
# Install: sudo cp deploy/logrotate.conf /etc/logrotate.d/unicornx

/opt/unicornxaleo/server/logs/*.log {
    weekly
    missingok
    rotate 8
    compress
    delaycompress
    notifempty
    copytruncate
    dateext
    dateformat -%Y%m%d
}

/var/log/nginx/unicornx_*.log {
    weekly
    missingok
    rotate 8
    compress
    delaycompress
    notifempty
    sharedscripts
    postrotate
        [ -f /var/run/nginx.pid ] && kill -USR1 $(cat /var/run/nginx.pid) 2>/dev/null || true
    endscript
}
