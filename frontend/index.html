  <body class="bg-yc-light dark:bg-yc-dark text-yc-text-primary dark:text-white">

    <div id="pre-splash" style="position:fixed;inset:0;z-index:99999;background:#050505;display:flex;align-items:center;justify-content:center;flex-direction:column">

        <div style="width:30%;height:100%;background:linear-gradient(90deg,#F97316,#FDBA74);border-radius:4px;animation:pre-grow 1.5s ease-out forwards"></div>
      </div>
      <style>@keyframes pre-grow{to{width:70%}}</style>
